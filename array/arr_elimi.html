<!DOCTYPE html>
  <h2>🗑 Lista con Eliminación</h2> 
 
  <div style="display:flex; gap:8px; margin-bottom:20px;"> 
    <input id="inp-elem" type="text" placeholder="Agregar elemento..." 
           style="flex:1; padding:10px; font-size:16px; 
                  border:2px solid #ccc; border-radius:8px;"> 
    <button onclick="agregar()" 
            style="padding:10px 20px; background:#148F77; color:white; 
                   border:none; border-radius:8px; cursor:pointer; font-size:16px;"> 
      + Agregar 
    </button> 
  </div> 
 
  <div id="contenedor"></div> 
 
  <style> 
    body { font-family:sans-serif; max-width:520px; margin:40px auto; padding:20px; } 
    .fila { 
      display:flex; align-items:center; justify-content:space-between; 
      padding:12px 16px; margin-bottom:8px; 
      background:#D1F2EB; border-left:4px solid #148F77; 
      border-radius:0 8px 8px 0; font-size:17px; 
    } 
    .btn-eliminar { 
      background:#E74C3C; color:white; border:none; 
      padding:6px 12px; border-radius:6px; cursor:pointer; 
      font-size:14px; font-weight:bold; 
    } 
    .btn-eliminar:hover { background:#C0392B; } 
  </style> 
   <script src="arr_elimi.js"></script>
</body>
