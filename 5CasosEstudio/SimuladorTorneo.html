<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Torneo - Liga Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="SimuladorTorneo.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">

    <main class="max-w-6xl mx-auto space-y-8">
        <header class="text-center">
            <h1 class="text-4xl font-black text-emerald-400">🏆 SIMULADOR DE TORNEO</h1>
            <p class="text-slate-400 mt-2">Sistema "Todos contra Todos" con desempate técnico</p>
        </header>

        <!-- Registro y Acciones -->
        <section class="grid md:grid-cols-2 gap-6">
            <div class="glass p-6 rounded-3xl border border-slate-700">
                <h2 class="text-xl font-bold mb-4">Registrar Equipos</h2>
                <div class="flex gap-2">
                    <input type="text" id="teamInput" placeholder="Nombre del equipo..." 
                           class="bg-slate-800 border border-slate-600 rounded-xl px-4 py-2 flex-grow focus:outline-none focus:border-emerald-400">
                    <button id="addTeamBtn" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold px-6 py-2 rounded-xl transition">
                        Añadir
                    </button>
                </div>
                <div id="teamBadgeContainer" class="flex flex-wrap gap-2 mt-4"></div>
            </div>

            <div class="glass p-6 rounded-3xl border border-slate-700 flex flex-col justify-center gap-3">
                <button id="startTournamentBtn" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold py-3 rounded-xl transition">
                    Generar Fixture
                </button>
                <div class="grid grid-cols-2 gap-3">
                    <button id="simulateBtn" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold py-2 rounded-xl transition hidden">
                        Simular Próximo Partido
                    </button>
                    <button id="resetBtn" class="bg-rose-500 hover:bg-rose-400 text-slate-950 font-bold py-2 rounded-xl transition">
                        Reiniciar Todo
                    </button>
                </div>
            </div>
        </section>

        <!-- Tabla y Partidos -->
        <section class="grid lg:grid-cols-3 gap-8">
            <!-- Tabla de Posiciones -->
            <div class="lg:col-span-2 space-y-4">
                <h3 class="text-2xl font-bold italic text-sky-300">Tabla de Posiciones</h3>
                <div class="overflow-x-auto glass rounded-2xl border border-slate-700">
                    <table class="w-full text-left">
                        <thead class="bg-slate-800/50 text-slate-400 uppercase text-xs">
                            <tr>
                                <th class="p-4">Pos</th>
                                <th class="p-4">Equipo</th>
                                <th class="p-4 text-center">PJ</th>
                                <th class="p-4 text-center">GF</th>
                                <th class="p-4 text-center">GC</th>
                                <th class="p-4 text-center text-emerald-400">PTS</th>
                            </tr>
                        </thead>
                        <tbody id="standingsBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Fixture/Resultados -->
            <div class="space-y-4">
                <h3 class="text-2xl font-bold italic text-amber-300">Fixture / Partidos</h3>
                <div id="fixtureContainer" class="space-y-3 max-h-[500px] overflow-y-auto pr-2"></div>
            </div>
        </section>
    </main>

    <script src="SimuladorTorneo.js"></script>
</body>
</html>
