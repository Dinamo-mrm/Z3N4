<!DOCTYPE html>
  <h2>🐶 ¿Cuántos años tienes en años caninos?</h2> 
 
  <input id="edad-humana" 
         type="number" 
         placeholder="Tu edad en años" 
         min="1" max="100"> 
 
  <button onclick="calcularEdadCanina()">Calcular 🐾</button> 
 
  <div id="resultado"></div> 
 
  <style> 
    body   { font-family: sans-serif; text-align: center; padding: 40px; } 
    input  { padding: 12px; font-size: 20px; width: 200px; 
             border: 2px solid #ccc; border-radius: 10px; } 
    button { padding: 12px 24px; font-size: 18px; margin-left: 10px; 
             background: #EA580C; color: white; border: none; 
             border-radius: 10px; cursor: pointer; } 
    #resultado { font-size: 28px; margin-top: 24px; font-weight: bold; } 
  </style> 
  <script src="edadcanina.js"></script>
</body>
