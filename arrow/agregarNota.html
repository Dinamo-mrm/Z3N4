<!DOCTYPE html>
  <h2>📝 Generador de Notas</h2> 
 
  <input id="inp-texto" type="text" 
         placeholder="Escribe una nota..." 
         style="width: 300px"> 
 
  <button onclick="agregarNota()">Agregar nota +</button> 
  <button onclick="borrarTodo()">🗑 Borrar todo</button> 
 
  <div id="libreta"></div> 
 
  <style> 
    body    { font-family: sans-serif; padding: 40px; max-width: 600px; margin: auto; } 
    input   { padding: 10px; font-size: 16px; border: 2px solid #ccc; border-radius: 
8px; } 
    button  { padding: 10px 20px; font-size: 16px; margin-left: 8px; 
              border: none; border-radius: 8px; cursor: pointer; } 
    #libreta { margin-top: 24px; } 
    .nota   { background: #F0FDFA; border-left: 4px solid #0D9488; 
              padding: 12px; margin-bottom: 10px; border-radius: 0 8px 8px 0; } 
  </style> 
  <script src="agregarNota.js"></script>
</body>
