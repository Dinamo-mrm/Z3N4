<body>
  <h2>🎯 Adivina el Número Secreto (del 1 al 10)</h2>

  <input
    id="inp-numero"
    type="number"
    min="1"
    max="10"
    placeholder="Tu apuesta"
  />

  <button onclick="adivinar()">¡Adivinar!</button>

  <div id="feedback"></div>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
    }
    input {
      padding: 12px;
      font-size: 24px;
      width: 120px;
      text-align: center;
      border: 2px solid #ccc;
      border-radius: 10px;
    }
    button {
      padding: 12px 24px;
      font-size: 18px;
      margin-left: 8px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    #feedback {
      font-size: 28px;
      margin-top: 28px;
      font-weight: bold;
    }
  </style>
  <script src="numsecret.js"></script>
</body>
