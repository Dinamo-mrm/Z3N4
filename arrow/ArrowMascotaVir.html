<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 - Mascota Virtual</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        /* Estilos para que se vea similar al ejercicio */
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 250px;
            text-align: center;
        }

        .card div {
            margin-bottom: 10px;
            color: #333;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // Clase Mascota (Solución del ejercicio)
        class Mascota {
            constructor(nombre, emoji) {
                this.nombre = nombre;
                this.emoji = emoji;
                this.hambre = 50;
                this.energia = 70;
                this.felicidad = 60;
            }

            alimentar() {
                this.hambre = Math.max(0, this.hambre - 30);
                this.felicidad = Math.min(100, this.felicidad + 5);
            }

            jugar() {
                if (this.energia < 15) {
                    alert(`${this.nombre} está muy cansado para jugar...`);
                    return;
                }
                this.energia = Math.max(0, this.energia - 20);
                this.hambre = Math.min(100, this.hambre + 10);
                this.felicidad = Math.min(100, this.felicidad + 15);
            }

            dormir() {
                this.energia = Math.min(100, this.energia + 30);
                this.hambre = Math.min(100, this.hambre + 5);
            }

            // Reto 1.3: Componente que devuelve el string HTML
            getHTML() {
                return `
                    <div class="card">
                        <div style="font-size: 3rem;">${this.emoji}</div>
                        <div><strong>${this.nombre}</strong></div>
                        <hr>
                        <div>🍔 Hambre: ${this.hambre}%</div>
                        <div>⚡ Energía: ${this.energia}%</div>
                        <div>😊 Felicidad: ${this.felicidad}%</div>
                        <br>
                        <button id="btnComer">Alimentar</button>
                        <button id="btnJugar">Jugar</button>
                        <button id="btnDormir">Dormir</button>
                    </div>
                `;
            }

            render(container) {
                container.innerHTML = this.getHTML();

                // Manejadores de eventos con Arrow Functions
                document.getElementById('btnComer').onclick = () => {
                    this.alimentar();
                    this.render(container);
                };

                document.getElementById('btnJugar').onclick = () => {
                    this.jugar();
                    this.render(container);
                };

                document.getElementById('btnDormir').onclick = () => {
                    this.dormir();
                    this.render(container);
                };
            }
        }

        // Inicialización
        const miMascota = new Mascota("Firulais", "🐕");
        miMascota.render(document.getElementById('app'));
    </script>
</body>
</html>
