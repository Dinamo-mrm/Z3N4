<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestor de Notas POO - DinamoDev</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background: #f0f2f5; }
    .panel { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .controles { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
    textarea { width: 100%; height: 80px; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; resize: none; }
    
    .nota-card { padding: 15px; border-radius: 10px; margin-bottom: 12px; position: relative; border-left: 6px solid rgba(0,0,0,0.1); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .nota-fecha { font-size: 11px; opacity: 0.7; font-weight: bold; }
    .btn-del { position: absolute; top: 10px; right: 10px; cursor: pointer; background: rgba(0,0,0,0.1); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
    
    .btn-save { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn-export { background: #34a853; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }
    .search-box { width: 100%; padding: 8px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; }
    #storage-info { font-size: 11px; color: #888; text-align: right; margin-top: 10px; }
  </style>
</head>
<body>

<div class="panel">
  <h2>💾 Notas Persistentes (<span id="cont-notas">0</span>)</h2>
  
  <input type="text" class="search-box" placeholder="🔍 Buscar notas..." oninput="gestor.buscar(this.value)">
  
  <textarea id="inp-nota" placeholder="Escribe algo importante..."></textarea>
  
  <div class="controles">
    <input type="color" id="color-nota" value="#fff475">
    <button class="btn-save" onclick="gestor.guardar()">💾 Guardar</button>
    <button class="btn-export" onclick="gestor.exportar()">📥 Exportar JSON</button>
    <button onclick="gestor.limpiarTodo()" style="background:#eee; border:none; padding:10px; border-radius:8px; cursor:pointer;">🗑 Borrar Todo</button>
  </div>

  <div id="lista-notas"></div>
  <div id="storage-info"></div>
</div>

<script>
class GestorNotas {
  static CLAVE = "mis_notas_poo";

  constructor() {
    this.notas = this.cargarDeStorage();
    this.render();
  }

  cargarDeStorage() {
    const json = localStorage.getItem(GestorNotas.CLAVE);
    return json ? JSON.parse(json) : [];
  }

  guardarEnStorage() {
    localStorage.setItem(GestorNotas.CLAVE, JSON.stringify(this.notas));
  }

  guardar() {
    const texto = document.getElementById("inp-nota").value.trim();
    const color = document.getElementById("color-nota").value;
    if (!texto) return;

    const nota = {
      id: Date.now(),
      texto,
      color,
      fecha: new Date().toLocaleString()
    };

    this.notas.unshift(nota);
    this.guardarEnStorage();
    document.getElementById("inp-nota").value = "";
    this.render();
  }

  eliminar(id) {
    this.notas = this.notas.filter(n => n.id !== id);
    this.guardarEnStorage();
    this.render();
  }

  buscar(termino) {
    const t = termino.toLowerCase();
    const filtradas = this.notas.filter(n => n.texto.toLowerCase().includes(t));
    this.render(filtradas);
  }

  exportar() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.notas));
    const link = document.createElement('a');
    link.href = dataStr;
    link.download = "respaldo_notas.json";
    link.click();
  }

  limpiarTodo() {
    if (!confirm("¿Borrar todo permanentemente?")) return;
    this.notas = [];
    localStorage.removeItem(GestorNotas.CLAVE);
    this.render();
  }

  render(notasAMostrar = this.notas) {
    document.getElementById("cont-notas").innerHTML = this.notas.length;
    const lista = document.getElementById("lista-notas");
    lista.innerHTML = "";

    notasAMostrar.forEach(n => {
      lista.innerHTML += `
        <div class="nota-card" style="background: ${n.color}44; border-color: ${n.color}">
          <div class="nota-fecha">${n.fecha}</div>
          <p>${n.texto}</p>
          <div class="btn-del" onclick="gestor.eliminar(${n.id})">✕</div>
        </div>
      `;
    });

    const bytes = (localStorage.getItem(GestorNotas.CLAVE) || "").length;
    document.getElementById("storage-info").innerHTML = `💾 Almacenamiento: ~${bytes} bytes`;
  }
}

const gestor = new GestorNotas();
</script>

</body>
</html>
